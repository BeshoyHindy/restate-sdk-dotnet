name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.102'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=results.trx" --collect:"XPlat Code Coverage"

      - name: Coverage summary
        run: |
          {
            echo "## Code Coverage"
            echo ""
            echo "| Test project | Line | Branch |"
            echo "|--------------|------|--------|"
            find . -path '*/TestResults/*' -name 'coverage.cobertura.xml' | sort | while read -r f; do
              proj=$(echo "$f" | sed -E 's|^\./(.*)/TestResults/.*|\1|')
              line=$(grep -o 'line-rate="[0-9.]*"' "$f" | head -1 | grep -o '[0-9.]*')
              branch=$(grep -o 'branch-rate="[0-9.]*"' "$f" | head -1 | grep -o '[0-9.]*')
              awk -v p="$proj" -v l="$line" -v b="$branch" \
                'BEGIN { printf "| %s | %.1f%% | %.1f%% |\n", p, l*100, b*100 }'
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pack
        run: dotnet pack --no-build -c Release -o ./artifacts

      - name: Verify generator bundled
        run: |
          unzip -l ./artifacts/Restate.Sdk.0.*.nupkg | grep -q "analyzers/dotnet/cs/Restate.Sdk.Generators.dll"
          echo "Generator DLL verified in package."

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: '**/results.trx'

  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.102'

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.102'

      - name: Install AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Run integration tests
        run: |
          chmod +x .github/scripts/integration-test.sh
          .github/scripts/integration-test.sh
