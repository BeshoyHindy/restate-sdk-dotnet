name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Tags created with the default GITHUB_TOKEN do not trigger other
          # workflows (publish.yml). Configure a RELEASE_PLEASE_TOKEN PAT
          # secret to have the release tag trigger the NuGet publish.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
